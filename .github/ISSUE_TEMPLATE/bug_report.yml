name: "🐛 Bug report"
description: "Report a problem or regression to help us improve."
title: "[Bug]: "
labels:
  - bug
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please provide as much detail as you can. Minimal repros help a lot.

  - type: checkboxes
    id: checks
    attributes:
      label: "Pre-flight checklist"
      options:
        - label: "I searched existing issues and did not find a duplicate."
          required: true
        - label: "I can reproduce this on the latest version of the code (or the latest release), if applicable."
          required: false
        - label: "I have included logs/screenshots where relevant."
          required: false

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: "Where does the bug occur?"
      multiple: true
      options:
        - Backend
        - Frontend
        - API
        - Database
        - Auth
        - CI/CD
        - Docs
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Version / Commit"
      description: "Release version or commit SHA where you observed this."
      placeholder: "e.g. v1.2.3 or 4f3c2d1"
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: "Bug summary"
      description: "What happened?"
      placeholder: "A clear and concise description of the bug."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      placeholder: "What actually happened? Include error messages verbatim if possible."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "Provide a numbered list of steps so we can reproduce the issue."
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error '...'
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "Minimal reproduction (if applicable)"
      description: "Link a minimal repo, snippet, or provide the smallest set of steps/config that reproduces the issue."
      placeholder: "https://github.com/yourname/repro or paste minimal config/snippet"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Logs / stack traces"
      description: "Paste relevant logs. This will be formatted as code automatically."
      render: shell
      placeholder: |
        Paste logs here...
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: "Environment"
      description: "Help us understand the runtime environment."
      placeholder: |
        - OS:
        - Browser (if frontend):
        - Node version (if applicable):
        - Python/Java/etc (if applicable):
        - Database:
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "Additional context"
      description: "Anything else that might help? (screenshots, related issues, config, etc.)"
    validations:
      required: false
